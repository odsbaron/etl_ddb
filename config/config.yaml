mysql:
  host: 10.0.0.1
  port: 3306
  user: reader
  password: "pass"
  database: source_db

dolphindb:
  host: 10.0.0.2
  port: 8848
  user: admin
  password: "pass"
  db_path: "dfs://target_db"

checkpoint:
  db_path: "/opt/airflow/checkpoint.db"

jobs:
  - name: order_sync
    mysql_table: orders
    dolphindb_table: orders
    incremental: true
    incremental_col: last_modified
    time_column: last_modified
    writer_strategy: window_overwrite
    chunk_size: 100000
    field_mapping:
      - mysql: order_id
        dolphindb: orderId
        type: SYMBOL
      - mysql: customer
        dolphindb: customer
        type: STRING
      - mysql: amount
        dolphindb: amt
        type: DOUBLE
      - mysql: last_modified
        dolphindb: updateTime
        type: TIMESTAMP
